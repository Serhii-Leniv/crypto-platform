spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    gateway:
      routes:
        # Auth Service Routes — rate-limited, no JWT required
        - id: auth-register
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/register
            - Method=POST
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /api/v1/auth/$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 6
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        - id: auth-login
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/login
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        - id: auth-refresh
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/refresh
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        - id: auth-logout
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/logout
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        # Order Matching Service Routes (JWT required) — 10 req/s per authenticated user
        - id: orders-all
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - JwtAuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: order-cb
                fallbackUri: forward:/fallback/orders

        # Wallet Service Routes (JWT required) — 5 req/s per authenticated user (financial ops)
        - id: wallet-all
          uri: ${WALLET_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/wallets/**
          filters:
            - JwtAuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: wallet-cb
                fallbackUri: forward:/fallback/wallets

        # Market Data Service Routes (Public) — 30 req/s per IP (read-heavy public endpoint)
        - id: market-data
          uri: ${MARKET_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/market-data/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: market-cb
                fallbackUri: forward:/fallback/market-data

        # Markets registry (Public) — trading-pair whitelist served by order-matching.
        # No JWT: clients must be able to fetch the list of tradable symbols before login
        # to populate selectors. Validation that enforces the list runs server-side on order placement.
        - id: markets
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/markets/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: order-cb
                fallbackUri: forward:/fallback/orders

        # Admin — users registry (auth-service). requireAdmin gates by isAdmin JWT claim.
        - id: admin-users
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/admin/users
          filters:
            - JwtAuthenticationFilter=true
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        # Admin — orders + markets management (order-matching). Same admin gate.
        - id: admin-orders
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/admin/orders,/api/v1/admin/markets/**
          filters:
            - JwtAuthenticationFilter=true
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: order-cb
                fallbackUri: forward:/fallback/orders

        # WebSocket — Market Data real-time feed (public)
        - id: ws-market-data
          uri: ${MARKET_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/ws/market-data/**
          filters:
            - RewritePath=/ws/market-data/(?<segment>.*), /ws/$\{segment}

        # WebSocket — Order Book real-time feed (public)
        - id: ws-orderbook
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/ws/orderbook/**
          filters:
            - RewritePath=/ws/orderbook/(?<segment>.*), /ws/$\{segment}

        # Fallback routes
        - id: fallback-auth
          uri: no://op
          predicates:
            - Path=/fallback/auth
        - id: fallback-orders
          uri: no://op
          predicates:
            - Path=/fallback/orders
        - id: fallback-wallets
          uri: no://op
          predicates:
            - Path=/fallback/wallets
        - id: fallback-market-data
          uri: no://op
          predicates:
            - Path=/fallback/market-data

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Set-Cookie
            allowCredentials: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      auth-cb:
        baseConfig: default
      order-cb:
        baseConfig: default
      wallet-cb:
        baseConfig: default
      market-cb:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      auth-cb:
        baseConfig: default
      order-cb:
        baseConfig: default
      wallet-cb:
        baseConfig: default
      market-cb:
        baseConfig: default

server:
  port: 8080
  shutdown: graceful

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

  # Distributed Tracing
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
