name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (e.g. 2)'
        required: true
        type: number

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    name: Run PR Agent
    steps:
      - name: PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: "dummy"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Both names — litellm picks up GEMINI_API_KEY, PR-Agent picks up GOOGLE_AI_STUDIO_KEY
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GEMINI_API_KEY }}
          github_action_config.pr_number: ${{ inputs.pr_number }}
