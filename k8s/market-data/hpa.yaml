apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: market-service-hpa
  namespace: crypto-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: market-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: market-service-pdb
  namespace: crypto-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: market-service
