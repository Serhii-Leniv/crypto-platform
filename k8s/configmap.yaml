apiVersion: v1
kind: ConfigMap
metadata:
  name: crypto-platform-config
  namespace: crypto-platform
data:
  POSTGRES_USER: crypto_user
  SPRING_DATASOURCE_USERNAME: crypto_user
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SPRING_DATA_REDIS_HOST: redis-cache
  SPRING_DATA_REDIS_PORT: "6379"
  ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
  SPRING_PROFILES_ACTIVE: prod
  SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
  # Auth service URLs used by gateway
  AUTH_SERVICE_URL: http://auth-service:8081
  ORDER_SERVICE_URL: http://order-service:8082
  WALLET_SERVICE_URL: http://wallet-service:8083
  MARKET_SERVICE_URL: http://market-service:8084
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
