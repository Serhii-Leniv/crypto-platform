# Deny all ingress by default; allow only documented service-to-service paths.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: crypto-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Gateway — accept traffic from ingress controller and Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: crypto-platform
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8080

---
# Auth — only accept from gateway and Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-ingress
  namespace: crypto-platform
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8081
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8081

---
# Order — only accept from gateway and Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-ingress
  namespace: crypto-platform
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8082
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8082

---
# Wallet — only accept from gateway and Prometheus (Kafka consumer, no HTTP from other services)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wallet-ingress
  namespace: crypto-platform
spec:
  podSelector:
    matchLabels:
      app: wallet-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8083
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8083

---
# Market Data — accept from gateway and Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-market-ingress
  namespace: crypto-platform
spec:
  podSelector:
    matchLabels:
      app: market-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8084
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8084

---
# PostgreSQL — only accept from microservices
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: crypto-platform
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - auth-service
                  - order-service
                  - wallet-service
                  - market-service
      ports:
        - port: 5432

---
# Kafka — accept from order producer and both consumers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
  namespace: crypto-platform
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - order-service
                  - wallet-service
                  - market-service
      ports:
        - port: 9092
        - port: 29092
