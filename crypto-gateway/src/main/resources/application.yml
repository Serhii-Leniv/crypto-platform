spring:
  application:
    name: crypto-gateway
  cloud:
    gateway:
      routes:
        # Auth Service Routes (No JWT required)
        - id: auth-register
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/register
            - Method=POST
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /api/v1/auth/$\{segment}

        - id: auth-login
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/login
            - Method=POST

        - id: auth-refresh
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/refresh
            - Method=POST

        - id: auth-logout
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/logout
            - Method=POST

        # Order Matching Service Routes (JWT required)
        - id: orders-all
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - JwtAuthenticationFilter

        # Wallet Service Routes (JWT required)
        - id: wallet-all
          uri: ${WALLET_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/wallets/**
          filters:
            - JwtAuthenticationFilter

        # Market Data Service Routes (Public access)
        - id: market-data
          uri: ${MARKET_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/market-data/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

server:
  port: 8080

# JWT Configuration
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
